[build]
  # On Netlify CI, build the edge bundle first then the Astro site
  command = "cd ../../packages/netlify && npm run build && cd - && astro build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[dev]
  # Local dev: point netlify-cli at the astro dev server
  framework = "astro"

[[edge_functions]]
  path = "/*"
  function = "aeo"
